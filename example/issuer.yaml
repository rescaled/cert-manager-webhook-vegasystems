apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-vegasystems
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: test@example.com
    privateKeySecretRef:
      name: letsencrypt-vegasystems-account
    solvers:
      - dns01:
          webhook:
            groupName: acme.vegasystems.de
            solverName: vegasystems
            config:
              # Customer ID issued by VegaSystems for your account.
              customerId: 12345
              # ttl is optional; default is 300 (seconds), which is also the
              # API-enforced minimum. Lower values are rejected.
              ttl: 300
              apiUserSecretRef:
                name: vegasystems-credentials
                key: apiUser
              apiKeySecretRef:
                name: vegasystems-credentials
                key: apiKey
